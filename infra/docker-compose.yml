services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://ims:ims@postgres:5432/ims_db?schema=public
      MONGO_URL: mongodb://mongo:27017/ims_raw
      REDIS_URL: redis://redis:6379
      VIEWER_API_KEY: viewer-demo-key
      OPERATOR_API_KEY: operator-demo-key
      ADMIN_API_KEY: admin-demo-key
      MAX_WAITING_JOBS: 25000
      INGESTION_MAX_RPS: 300
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q nginx"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
